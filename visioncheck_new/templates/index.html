{% extends 'base.html' %}
{% block auth_content %}
<div class="login-bg p-3">
  <div class="login-card">
    <div class="text-center mb-4">
      <div class="login-eye-icon"><i class="bi bi-eye-fill" style="color:var(--accent)"></i></div>
      <h4 class="fw-bold mb-1" style="color:var(--text-primary)">Oculux</h4>
      <p class="small" style="color:var(--text-muted)">AI-powered eye health screening</p>
    </div>

    <ul class="nav nav-pills nav-fill mb-4 p-1 rounded-3" style="background:var(--bg-elevated)" id="authTabs">
      <li class="nav-item"><button class="nav-link active fw-semibold" data-bs-toggle="pill" data-bs-target="#loginPane">Sign In</button></li>
      <li class="nav-item"><button class="nav-link fw-semibold" data-bs-toggle="pill" data-bs-target="#registerPane">Register</button></li>
    </ul>

    <div class="tab-content">
      <div class="tab-pane fade show active" id="loginPane">
        <form method="POST" action="{{ url_for('login') }}">
          <input type="hidden" name="action" value="login">
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">Sign In <i class="bi bi-arrow-right ms-1"></i></button>
        </form>
        <p class="text-center small mt-3 mb-0" style="color:var(--text-muted)">Demo: test@test.com / test123</p>
      </div>
      <div class="tab-pane fade" id="registerPane">
        <form method="POST" action="{{ url_for('login') }}">
          <input type="hidden" name="action" value="register">
          <div class="mb-3">
            <label class="form-label">Full name</label>
            <input type="text" name="name" class="form-control" placeholder="Your name" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Age</label>
            <input type="number" name="age" class="form-control" placeholder="25" min="5" max="100">
          </div>
          <div class="mb-3">
            <label class="form-label">Email address</label>
            <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="mb-4">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Choose a password" required minlength="6">
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold py-2">Create Account <i class="bi bi-person-plus ms-1"></i></button>
        </form>
      </div>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}{% for cat, msg in messages %}
        <div class="alert alert-{{ cat }} mt-3 py-2 small">{{ msg }}</div>
      {% endfor %}{% endif %}
    {% endwith %}
  </div>
</div>
{% endblock %}
